# ============================================================
# secrets.example.toml
# SIMAP-IA | Configuración privada para registro en Google Sheets
# ============================================================
# Copia este contenido a:
#   simap-ia-web-public/.streamlit/secrets.toml
#
# En Streamlit Community Cloud, pega este contenido en:
#   App settings > Secrets
#
# IMPORTANTE:
# - No subas secrets.toml a GitHub.
# - Comparte el Google Sheet con el client_email de la cuenta de servicio.
# - Reemplaza todos los valores de ejemplo por los valores reales.

SIMAP_PERSISTENCE_BACKEND = "google_sheets"
GOOGLE_SHEETS_ENABLED = true
GOOGLE_SHEET_ID = "PEGAR_AQUI_EL_ID_DEL_GOOGLE_SHEET"
GOOGLE_PREDICTIONS_SHEET = "registro_pruebas"
GOOGLE_EVENTS_SHEET = "registro_interacciones"
APP_VERSION = "SIMAP-IA-v1.0"

[GOOGLE_SERVICE_ACCOUNT]
type = "service_account"
project_id = "tu-proyecto-google-cloud"
private_key_id = "private-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\nPEGAR_CLAVE_PRIVADA\n-----END PRIVATE KEY-----\n"
client_email = "cuenta-servicio@tu-proyecto.iam.gserviceaccount.com"
client_id = "client-id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/cuenta-servicio%40tu-proyecto.iam.gserviceaccount.com"
